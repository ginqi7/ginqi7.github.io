<!doctype html>
<html>
  <head>
    <title>Thoughts</title>
    <script>
      fetch("content-map.json")
      .then(res => res.json())
      .then(data => { 
        var keys = Object.keys(data);
        var size = keys.length
        var random_index = Math.floor(Math.random() * size);
        window.location.href = keys[random_index];
      })
    </script>
  </head>
</html>
