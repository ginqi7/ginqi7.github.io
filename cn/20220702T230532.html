<script
>
 document.addEventListener('DOMContentLoaded', function() {
   var x = document.getElementsByClassName("org-src-container");
   len = x.length;
   for(i = 0; i < len; i++) {
     var codeElements = x[i].getElementsByTagName("pre");
     if(codeElements.length != 1) {continue}
     var codeClasses = codeElements[0].classList;
     var srcName;
     if (codeClasses.length == 1) {
       srcName = codeClasses[0]
     } else if (codeClasses.length == 2) {
       srcName = codeClasses[1]       
     }
     var code = x[i].outerHTML;
     var fold = document.createElement("details");
     fold.innerHTML = `<summary>Code Source(${srcName}): </summary>` + code; 
     var fa = x[i].parentNode; 
     fa.replaceChild(fold, x[i]); 
   }
 });

</script>

<h1 class="title">棋局</h1>
<p>
就像你拉着别人陪你下棋。你趣味盎然，自以为对方也乐在其中。直到最后，他推了棋盘，起身离坐。你才哑然失笑，原来这场对决之中，对方索然无味，又不忍推却，直至忍无可忍。再回头看整盘棋局，处处透露着对方的情绪，只是你全然未觉。根源在于，你自以为双方志趣相投，他原觉得自己能够勉强忍受。到最后，棋局散去，一方满腹牢骚，另一方莫名其妙。如果当初，各自言明彼此心思，结局或许将会是另一番景象。
</p>
